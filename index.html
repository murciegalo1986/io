<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murciegalo Digital Art</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Didact+Gothic&display=swap" rel="stylesheet">
<style>
:root{--ink:#0e0e0e;--paper:#f5f2ed;--accent:#c8a97e;--muted:#9a9087;--light:#e8e3db;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:'Didact Gothic',sans-serif;min-height:100vh;cursor:none;}
.cursor{position:fixed;width:8px;height:8px;background:var(--ink);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid var(--ink);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.5;transition:width .3s,height .3s;}
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:flex-start;padding:2rem 3rem;background:rgba(245,242,237,0.92);backdrop-filter:blur(8px);}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:var(--ink);text-decoration:none;}
nav a{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-left:2.5rem;transition:color .3s;}
nav a:hover{color:var(--ink);}
.hero{padding:13rem 3rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:1400px;margin:0 auto;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,7vw,8rem);font-weight:300;line-height:.9;letter-spacing:-.02em;}
.hero-title em{font-style:italic;color:var(--muted);}
.hero-meta{display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:.5rem;gap:.8rem;}
.hero-meta p{font-size:.68rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);max-width:260px;line-height:1.9;}
.hero-line{width:40px;height:1px;background:var(--accent);}
.gallery-section{padding:3rem 3rem 8rem;max-width:1400px;margin:0 auto;}
.section-label{display:flex;align-items:center;gap:1.5rem;margin-bottom:3rem;}
.section-label span{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
.section-label::after{content:'';flex:1;height:1px;background:var(--light);}
.loading{text-align:center;padding:6rem 0;}
.loading-dots{display:inline-flex;gap:.4rem;}
.loading-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:pulse 1.2s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.loading p{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:1rem;}
.masonry{columns:3;column-gap:1.2rem;}
@media(max-width:900px){.masonry{columns:2;}}
@media(max-width:560px){.masonry{columns:1;}.hero{grid-template-columns:1fr;padding:9rem 1.5rem 2rem;}.gallery-section{padding:2rem 1.5rem 6rem;}header{padding:1.2rem 1.5rem;}}
.photo-item{break-inside:avoid;margin-bottom:1.2rem;position:relative;overflow:hidden;cursor:none;opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease;}
.photo-item.visible{opacity:1;transform:translateY(0);}
.photo-item img{width:100%;display:block;transition:transform .6s cubic-bezier(.25,.46,.45,.94);filter:saturate(.9);}
.photo-item:hover img{transform:scale(1.04);filter:saturate(1.1);}
.photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(14,14,14,.55) 0%,transparent 50%);opacity:0;transition:opacity .4s;display:flex;align-items:flex-end;padding:1.2rem;}
.photo-item:hover .photo-overlay{opacity:1;}
.photo-caption{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:#f5f2ed;}
.lightbox{position:fixed;inset:0;background:rgba(14,14,14,.96);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lb-img-wrap{display:flex;align-items:center;justify-content:center;max-width:88vw;max-height:88vh;}
.lightbox img{max-width:88vw;max-height:88vh;object-fit:contain;transform:scale(.95);transition:transform .4s;}
.lightbox.open img{transform:scale(1);}
.lb-spinner{width:40px;height:40px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;position:absolute;}
@keyframes spin{to{transform:rotate(360deg);}}
.lb-close{position:absolute;top:2rem;right:2.5rem;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);cursor:none;transition:color .3s;}
.lb-close:hover{color:var(--paper);}
.lb-counter{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);font-size:.58rem;letter-spacing:.3em;color:var(--muted);}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;cursor:none;padding:1rem;transition:color .3s;}
.lb-nav:hover{color:var(--paper);}
.lb-prev{left:2rem;}.lb-next{right:2rem;}
.wa-btn{position:fixed;bottom:2rem;right:2rem;z-index:200;background:#25D366;color:#fff;border:none;padding:.8rem 1.4rem;font-family:'Didact Gothic',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;cursor:none;transition:background .3s;display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.wa-btn:hover{background:#1ebe5d;}
.wa-btn svg{width:16px;height:16px;fill:#fff;flex-shrink:0;}
footer{border-top:1px solid var(--light);padding:2rem 3rem;display:flex;justify-content:space-between;max-width:1400px;margin:0 auto;}
footer p{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9000;opacity:.35;}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<header>
  <a href="#" class="logo">Murciegalo Digital Art</a>
  <nav>
    <a href="#gallery">Compilatorio</a>
    <a href="https://wa.me/56933429671" target="_blank">Contacto</a>
  </nav>
</header>

<section class="hero">
  <h1 class="hero-title">Murciegalo<br><em>Digital Art</em></h1>
  <div class="hero-meta">
    <div class="hero-line"></div>
    <p>Arte digital enfocado<br>en la comunicación.</p>
  </div>
</section>

<section class="gallery-section" id="gallery">
  <div class="section-label"><span>Compilatorio</span></div>
  <div id="galleryContent">
    <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><p>Cargando obras</p></div>
  </div>
</section>

<footer>
  <p>Murciegalo Digital Art</p>
  <p id="year"></p>
</footer>

<div class="lightbox" id="lightbox">
  <div class="lb-close" id="lbClose">Cerrar</div>
  <button class="lb-nav lb-prev" id="lbPrev">← Prev</button>
  <div class="lb-img-wrap">
    <div class="lb-spinner" id="lbSpinner"></div>
    <img id="lbImg" src="" alt="" style="display:none;">
  </div>
  <button class="lb-nav lb-next" id="lbNext">Sig →</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<a class="wa-btn" href="https://wa.me/56933429671" target="_blank">
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  Contacto
</a>

<script>
const API_KEY='AIzaSyCWvK5pa5XfuA64f5-5DGjh7bm-zYCSmwo';
const FOLDER_ID='1QvxJ1wg7EtgvDzZCXNqyeb7caFKhicvE';
let photos=[],lbIdx=0;
document.getElementById('year').textContent=new Date().getFullYear();

async function init(){
  try{
    const url=`https://www.googleapis.com/drive/v3/files?q=%27${FOLDER_ID}%27+in+parents+and+mimeType+contains+%27image/%27+and+trashed%3Dfalse&fields=files(id,name)&pageSize=100&key=${API_KEY}`;
    const res=await fetch(url);
    const data=await res.json();
    if(data.error||!data.files||!data.files.length){
      document.getElementById('galleryContent').innerHTML='<p style="text-align:center;padding:4rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);">No se encontraron imágenes.</p>';
      return;
    }
    photos=data.files.map(f=>({
      id:f.id,
      name:f.name.replace(/\.[^.]+$/,''),
      thumb:`https://drive.google.com/thumbnail?id=${f.id}&sz=w800`
    }));
    const grid=document.createElement('div');
    grid.className='masonry';
    photos.forEach((p,i)=>{
      const item=document.createElement('div');
      item.className='photo-item';
      item.innerHTML=`<img src="${p.thumb}" alt="${p.name}" loading="lazy"><div class="photo-overlay"><span class="photo-caption">${p.name}</span></div>`;
      item.onclick=()=>openLb(i);
      grid.appendChild(item);
    });
    document.getElementById('galleryContent').innerHTML='';
    document.getElementById('galleryContent').appendChild(grid);
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:0.06});
    document.querySelectorAll('.photo-item').forEach(el=>obs.observe(el));
  }catch(e){
    document.getElementById('galleryContent').innerHTML='<p style="text-align:center;padding:4rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);">Error al cargar las imágenes.</p>';
  }
}

function openLb(i){
  lbIdx=i;
  updLb();
  document.getElementById('lightbox').classList.add('open');
}

function updLb(){
  const img=document.getElementById('lbImg');
  const spinner=document.getElementById('lbSpinner');
  img.style.display='none';
  spinner.style.display='block';
  // Usar thumbnail en alta resolución — evita bloqueos de CORS de Drive
  img.src='';
  img.src=`https://drive.google.com/thumbnail?id=${photos[lbIdx].id}&sz=w1600`;
  img.onload=()=>{spinner.style.display='none';img.style.display='block';};
  img.onerror=()=>{
    // fallback: intentar con sz=w1200
    img.src=`https://drive.google.com/thumbnail?id=${photos[lbIdx].id}&sz=w1200`;
    img.onload=()=>{spinner.style.display='none';img.style.display='block';};
  };
  document.getElementById('lbCounter').textContent=(lbIdx+1)+' / '+photos.length;
}

document.getElementById('lbClose').onclick=()=>document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').onclick=e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open');};
document.getElementById('lbPrev').onclick=e=>{e.stopPropagation();lbIdx=(lbIdx-1+photos.length)%photos.length;updLb();};
document.getElementById('lbNext').onclick=e=>{e.stopPropagation();lbIdx=(lbIdx+1)%photos.length;updLb();};
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft'){lbIdx=(lbIdx-1+photos.length)%photos.length;updLb();}
  if(e.key==='ArrowRight'){lbIdx=(lbIdx+1)%photos.length;updLb();}
  if(e.key==='Escape')document.getElementById('lightbox').classList.remove('open');
});

const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.onmousemove=e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';};
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,.photo-item').forEach(el=>{
  el.onmouseenter=()=>{cursor.style.width='14px';cursor.style.height='14px';ring.style.width='52px';ring.style.height='52px';};
  el.onmouseleave=()=>{cursor.style.width='8px';cursor.style.height='8px';ring.style.width='36px';ring.style.height='36px';};
});

init();
</script>
</body>
</html>
